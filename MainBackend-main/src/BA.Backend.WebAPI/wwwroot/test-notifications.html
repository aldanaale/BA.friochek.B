<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA.FrioCheck — Real-Time HUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --error: #ff4757;
            --warning: #ffa502;
            --bg: #0b0f19;
            --card: #16213e;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0b0f19);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00ff88, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-connected { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .status-connected .dot { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: pulse 2s infinite; }

        .status-disconnected { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.2); }
        .status-disconnected .dot { background: #ff4757; }

        .status-reconnecting { background: rgba(255, 165, 2, 0.1); color: #ffa502; border: 1px solid rgba(255, 165, 2, 0.2); }
        .status-reconnecting .dot { background: #ffa502; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .login-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .input-row {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary); /* Cambiado a primario para mejor contraste */
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05); /* Borde más grueso y visible */
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 1);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-1px);
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .btn-primary { background: var(--primary); color: #0b0f19; }
        .btn-primary:hover { box-shadow: 0 5px 15px var(--primary-glow); }
        
        .btn-danger { background: rgba(255, 71, 87, 0.2); color: var(--error); border: 1px solid var(--error); }

        #messages {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 14px;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            border-left: 4px solid var(--primary);
        }

        .msg-type-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 3px 10px;
            font-size: 0.55rem;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 6px;
            background: var(--primary);
            color: #0b0f19;
        }

        .msg-title { font-weight: 600; display: block; margin-bottom: 4px; }
        .msg-body { color: var(--text-dim); font-size: 0.9rem; line-height: 1.4; }
        .msg-footer { margin-top: 10px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FrioCheck Hub</h1>
            <div id="status-badge" class="status-badge status-disconnected">
                <span class="dot"></span>
                <span id="status-text">Sin Sesión</span>
            </div>
        </div>

        <div id="login-form" class="login-section">
            <div class="input-row">
                <div class="input-group">
                    <label>Email Corporativo</label>
                    <input type="email" id="email" placeholder="ej: admin@savory.cl" value="admin@savory.cl">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" value="DevPass123!">
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="login-btn" onclick="performLogin()">
                    Iniciar Sesión y Conectar
                </button>
            </div>
        </div>

        <div id="session-info" class="login-section" style="display: none; text-align: center;">
            <div>
                <p style="margin: 0; font-size: 1.1rem; color: var(--primary); font-weight: 600;">✅ Sesión Sincronizada Activa</p>
                <p id="user-display" style="margin: 8px 0 0; font-size: 0.85rem; color: var(--text-dim);"></p>
            </div>
            <div class="actions" style="justify-content: center;">
                <button class="btn btn-danger" style="max-width: 300px;" onclick="logout()">Cerrar Sesión Global</button>
            </div>
        </div>

        <div id="messages">
            <!-- Mensajes dinámicos -->
        </div>
    </div>

    <script>
        let connection = null;
        const STORAGE_KEY = 'friocheck_token';

        // Inicialización
        window.addEventListener('load', () => {
            const savedToken = localStorage.getItem(STORAGE_KEY);
            if (savedToken) {
                initSignalR(savedToken);
            }
        });

        // Sincronización Multi-pestaña
        window.addEventListener('storage', (event) => {
            if (event.key === STORAGE_KEY) {
                if (event.newValue) {
                    console.log("Nueva sesión detectada en otra pestaña. Reconectando...");
                    initSignalR(event.newValue);
                } else {
                    console.log("Sesión cerrada en otra pestaña. Desconectando...");
                    logout(false); // Logout sin limpiar localstorage por que ya lo está
                }
            }
        });

        async function performLogin() {
            const btn = document.getElementById("login-btn");
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-dots">Iniciando</span>';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    const token = result.data.accessToken;
                    localStorage.setItem(STORAGE_KEY, token);
                    pushMessage("Autenticación", "Inicio de sesión exitoso. Sincronizando canal...", "success");
                    initSignalR(token);
                } else {
                    alert("Error: " + (result.message || "Credenciales inválidas"));
                }
            } catch (err) {
                alert("Error de red: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Iniciar Sesión y Conectar";
            }
        }

        async function initSignalR(token) {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("session-info").style.display = "grid";
            
            // Decodificar algo básico del token para el display (opcional)
            document.getElementById("user-display").textContent = "Token detectado: " + token.substring(0, 20) + "...";

            if (connection) {
                await connection.stop();
            }

            connection = new signalR.HubConnectionBuilder()
                .withUrl("/hubs/notifications?access_token=" + token)
                .withAutomaticReconnect([0, 2000, 5000, 10000])
                .build();

            connection.on("ReceiveNotification", (title, message, type) => {
                pushMessage(title, message, type);
            });

            connection.onreconnecting(() => setStatus("Reconectando...", "status-reconnecting"));
            connection.onreconnected(() => setStatus("Conectado", "status-connected"));
            connection.onclose(() => {
                if(localStorage.getItem(STORAGE_KEY)) {
                    setStatus("Desconectado", "status-disconnected");
                }
            });

            try {
                await connection.start();
                setStatus("Conectado", "status-connected");
            } catch (err) {
                console.error("SignalR Start Error:", err);
                setStatus("Fallo de Conexión", "status-disconnected");
                // Si el token es inválido (401), forzar logout
                if (err.message.includes("401")) logout();
            }
        }

         function logout(clearStorage = true) {
            if (connection) connection.stop();
            if (clearStorage) localStorage.removeItem(STORAGE_KEY);
            
            document.getElementById("login-form").style.display = "grid";
            document.getElementById("session-info").style.display = "none";
            setStatus("Sin Sesión", "status-disconnected");
            pushMessage("Sesión Finalizada", "Se ha cerrado la conexión.", "warning");
        }

        function setStatus(text, className) {
            const badge = document.getElementById("status-badge");
            const label = document.getElementById("status-text");
            badge.className = "status-badge " + className;
            label.textContent = text;
        }

        function pushMessage(title, body, type) {
            const container = document.getElementById("messages");
            const card = document.createElement("div");
            card.className = "msg-card";
            
            const colors = { success: "#00ff88", error: "#ff4757", warning: "#ffa502", info: "#60efff" };
            const color = colors[type] || colors.info;
            card.style.borderLeftColor = color;

            card.innerHTML = `
                <div class="msg-type-badge" style="background: ${color}">${type}</div>
                <span class="msg-title">${title}</span>
                <span class="msg-body">${body}</span>
                <div class="msg-footer">
                    <span>${new Date().toLocaleTimeString()}</span>
                </div>
            `;
            container.prepend(card);
        }
    </script>
</body>
</html>
